name: Token Cache Template Validation

on:
  push:
    paths:
      - .github/workflows/token-cache-template.yml
      - .github/copilot-instructions.md
      - .github/instructions/token-efficiency.instructions.md
      - .github/skills/token-efficiency/**
      - .github/skills/token-cache-reuse/**
      - configs/token-cache/**
      - docs/token-efficiency.md
      - tools/token_cache_db.py
      - tools/token_cache_schema.sql
      - tools/validate_token_cache_template.py
  pull_request:
    paths:
      - .github/workflows/token-cache-template.yml
      - .github/copilot-instructions.md
      - .github/instructions/token-efficiency.instructions.md
      - .github/skills/token-efficiency/**
      - .github/skills/token-cache-reuse/**
      - configs/token-cache/**
      - docs/token-efficiency.md
      - tools/token_cache_db.py
      - tools/token_cache_schema.sql
      - tools/validate_token_cache_template.py
  workflow_dispatch:

jobs:
  validate-token-cache-template:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Validate token cache template workflow
        run: uv run python tools/validate_token_cache_template.py